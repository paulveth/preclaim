name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - all
          - core
          - cli
          - mcp

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    if: inputs.package == 'core' || inputs.package == 'all'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @preclaim/db build && pnpm --filter @preclaim/core build
      - name: Publish @preclaim/core
        working-directory: packages/core
        run: |
          pnpm pack
          npm publish *.tgz --access public

  publish-cli:
    if: always() && (inputs.package == 'cli' || inputs.package == 'all') && (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    needs: [publish-core]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @preclaim/db build && pnpm --filter @preclaim/core build && pnpm --filter preclaim build
      - name: Publish preclaim
        working-directory: packages/cli
        run: |
          pnpm pack
          npm publish *.tgz --access public

  publish-mcp:
    if: always() && (inputs.package == 'mcp' || inputs.package == 'all') && (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    needs: [publish-core]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @preclaim/db build && pnpm --filter @preclaim/core build && pnpm --filter @preclaim/mcp build
      - name: Publish @preclaim/mcp
        working-directory: packages/mcp
        run: |
          pnpm pack
          npm publish *.tgz --access public
