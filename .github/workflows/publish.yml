name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - all
          - core
          - cli
          - mcp

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    if: inputs.package == 'core' || inputs.package == 'all'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Check if publish needed
        id: check
        run: |
          LOCAL=$(node -p "require('./packages/core/package.json').version")
          REMOTE=$(npm view @preclaim/core version 2>/dev/null || echo "NONE")
          echo "needed=$( [ "$LOCAL" != "$REMOTE" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "@preclaim/core: local=$LOCAL npm=$REMOTE"
      - if: steps.check.outputs.needed == 'true'
        run: npm install -g npm@latest
      - if: steps.check.outputs.needed == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.check.outputs.needed == 'true'
        run: pnpm --filter @preclaim/db build && pnpm --filter @preclaim/core build
      - name: Publish @preclaim/core
        if: steps.check.outputs.needed == 'true'
        working-directory: packages/core
        run: |
          pnpm pack
          npm publish *.tgz --access public

  publish-cli:
    if: always() && (inputs.package == 'cli' || inputs.package == 'all') && (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    needs: [publish-core]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Check if publish needed
        id: check
        run: |
          LOCAL=$(node -p "require('./packages/cli/package.json').version")
          REMOTE=$(npm view preclaim version 2>/dev/null || echo "NONE")
          echo "needed=$( [ "$LOCAL" != "$REMOTE" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "preclaim: local=$LOCAL npm=$REMOTE"
      - if: steps.check.outputs.needed == 'true'
        run: npm install -g npm@latest
      - if: steps.check.outputs.needed == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.check.outputs.needed == 'true'
        run: pnpm --filter @preclaim/db build && pnpm --filter @preclaim/core build && pnpm --filter preclaim build
      - name: Publish preclaim
        if: steps.check.outputs.needed == 'true'
        working-directory: packages/cli
        run: |
          pnpm pack
          npm publish *.tgz --access public

  publish-mcp:
    if: always() && (inputs.package == 'mcp' || inputs.package == 'all') && (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    needs: [publish-core]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Check if publish needed
        id: check
        run: |
          LOCAL=$(node -p "require('./packages/mcp/package.json').version")
          REMOTE=$(npm view @preclaim/mcp version 2>/dev/null || echo "NONE")
          echo "needed=$( [ "$LOCAL" != "$REMOTE" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "@preclaim/mcp: local=$LOCAL npm=$REMOTE"
      - if: steps.check.outputs.needed == 'true'
        run: npm install -g npm@latest
      - if: steps.check.outputs.needed == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.check.outputs.needed == 'true'
        run: pnpm --filter @preclaim/db build && pnpm --filter @preclaim/core build && pnpm --filter @preclaim/mcp build
      - name: Publish @preclaim/mcp
        if: steps.check.outputs.needed == 'true'
        working-directory: packages/mcp
        run: |
          pnpm pack
          npm publish *.tgz --access public
