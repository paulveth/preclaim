<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 290" width="400" height="290">
  <rect width="400" height="290" fill="#000000"/>

  <defs>
    <mask id="keyhole">
      <rect width="400" height="290" fill="white"/>
      <!-- Circle: prominent round opening -->
      <circle cx="200" cy="95" r="24" fill="black"/>
      <!-- Trapezoid: wide at top, narrow at bottom — classic keyhole -->
      <polygon points="188,111 212,111 204,169 196,169" fill="black"/>
    </mask>
  </defs>

  <!-- Solid block cursor (landscape ~9:8) with keyhole cutout -->
  <rect x="110" y="40" width="180" height="160" rx="18" fill="#00e03c" mask="url(#keyhole)"/>

  <!-- Wordmark: tight spacing, underscore flush against m -->
  <text x="200" y="238" text-anchor="middle"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Source Code Pro','Courier New',monospace"
        font-size="28" font-weight="500">
    <tspan fill="#f5f5f7">preclaim</tspan><tspan fill="#00e03c">_</tspan>
  </text>
</svg>
